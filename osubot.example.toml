[osu]
# osu! API v2 credentials (https://osu.ppy.sh/home/account/edit#oauth)
api_key = "your-api-key-here"
client_id = "your-client-id-here"

[bot]
# OneBot 11 WebSocket URL
onebot_url = "ws://127.0.0.1:8080"

[database]
path = "osubot.db"

# [scheduler]
# All fields have defaults — optional, only override if needed.
# interval_minutes = 1
# semi_active_interval_hours = 4      # 4h内有游玩记录
# normal_interval_hours = 8           # 当日有游玩记录
# inactive_interval_hours = 48       # 48h以上无游玩记录
# no_recent_interval_hours = 6       # 无最近游玩记录
# user_not_exists_interval_hours = 24 # 用户不存在
# group_trigger_cooldown_hours = 1
# retention_days = 180
# cache_retention_days = 7

# [irc]
# IRC 鉴权绑定（需在 https://osu.ppy.sh/p/irc 获取密码）
# 可选，关闭时绑定无需验证。
# enabled = true
# server = "irc.ppy.sh"
# port = 6667
# nickname = "你的osu用户名"
# password = "IRC密码"

# [group_filter]
# 群聊黑白名单（可选，默认黑名单模式，名单为空=所有群可用）
# mode = "blacklist"        # "blacklist" 或 "whitelist"
# group_ids = []            # 黑名单/白名单的群号列表

# [groups.default]
# 命令开关（可选，默认全部开启）
# query = true              # ~、where、查
# score = true              # !p、!ps、!r、!rs、!s、!ss
# profile = true            # !profile
# highlight = true          # 今日高光
# bind = true               # 绑定、解绑

# [groups.123456789]
# 特定群的覆盖配置（可选，节名 = 群号）
# highlight = false         # 该群禁用今日高光

# [upstream]
# 上游自动绑定（可选，不配置则不启用）
# 当本地未绑定 QQ→osu! 时，自动向上游 bot 查询并完成绑定。
# enabled = true
#
# [[upstream.providers]]
# type = "xfs"              # 消防栓（hydrant）bot，通过 OneBot 中继查询
# url = "wss://public-service.b11p.com/"
# access_token = "bleatingsheep.org"
# self_id = 100000000       # 不配则随机，避免与其他客户端冲突
# timeout_secs = 10
# rate_per_minute = 10      # 每分钟查询上限
# burst = 20                # 突发排队上限
#
# [[upstream.providers]]
# type = "yumu"             # yumu-bot，直接连接 OneBot 服务（伪装用户 QQ 发 !bi 命令）
# url = "ws://121.41.63.60:11735/pub/onebotSocket"
# timeout_secs = 10
# rate_per_minute = 10
# burst = 20
# yumu 无需 access_token 和 self_id，直接伪装目标 QQ 连接

[plugin]
# Directory containing .wasm plugin files
dir = "./plugins"

# Plugin instances to load
[[plugin.instances]]
name = "hello"
path = "hello_plugin.wasm"
enabled = true
priority = 50
