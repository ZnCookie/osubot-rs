[osu]
# osu! API v2 OAuth 客户端凭证（https://osu.ppy.sh/home/account/edit#oauth）
client_secret = "your-client-secret-here"
client_id = "your-client-id-here"

[bot]
# OneBot 11 WebSocket 地址
onebot_url = "ws://127.0.0.1:8080"

# 命令处理总超时（秒），默认 180
# command_timeout_secs = 180

# profile 渲染超时（秒），默认 120
# render_timeout_secs = 120

# OneBot API 请求超时（秒），默认 10
# onebot_api_timeout_secs = 10

# UR 计算超时（秒），默认 15
# ur_timeout_secs = 15

[database]
path = "osubot.db"

# [scheduler]
# 所有字段均有默认值——可选，有需要才覆盖。
# interval_minutes = 1
# semi_active_interval_hours = 4      # 4h内有游玩记录
# normal_interval_hours = 8           # 当日有游玩记录
# inactive_interval_hours = 48       # 48h以上无游玩记录
# no_recent_interval_hours = 6       # 无最近游玩记录
# user_not_exists_interval_hours = 24 # 用户不存在
# group_trigger_cooldown_hours = 1
# retention_days = 180
# cache_retention_days = 7
# max_cache_size_bytes = 2147483648   # 渲染缓存最大大小（字节），默认 2GB

# [irc]
# IRC 鉴权绑定（需在 https://osu.ppy.sh/p/irc 获取密码）
# 可选，关闭时绑定无需验证。
# enabled = true
# server = "irc.ppy.sh"
# port = 6667
# nickname = "你的osu用户名"
# password = "IRC密码"

# [group_filter]
# 群聊黑白名单（可选，默认黑名单模式，名单为空=所有群可用）
# mode = "blacklist"        # "blacklist" 或 "whitelist"
# group_ids = []            # 黑名单/白名单的群号列表

# [groups.default]
# 命令开关（可选，默认全部开启）
# query = true              # ~、where、查
# score = true              # !p、!ps、!r、!rs、!s、!ss、!b、!bs、!t
# beatmap_preview = true    # !rv
# beatmap_audio = true      # !a
# profile = true            # !profile
# highlight = true          # 今日高光
# bind = true               # 绑定、解绑
# mode = true               # !mode（设置/查询默认模式）
# help = true               # !help
# match_listen = true       # !ml（比赛监听）
# ppy_sb = false            # ppy.sb 私服查询（默认关闭）

# [groups.123456789]
# 特定群的覆盖配置（可选，节名 = 群号）
# highlight = false         # 该群禁用今日高光

# [upstream]
# 上游自动绑定（可选，不配置则不启用）
# 当本地未绑定 QQ→osu! 时，自动向上游 bot 查询并完成绑定。
# enabled = true
#
# [[upstream.providers]]
# type = "xfs"              # 消防栓（hydrant）bot，通过 OneBot 中继查询
# url = "wss://public-service.b11p.com/"
# access_token = "bleatingsheep.org"
# self_id = 100000000       # 不配则随机，避免与其他客户端冲突
# timeout_secs = 10
# rate_per_minute = 10      # 每分钟查询上限
# burst = 20                # 突发排队上限
#
# [[upstream.providers]]
# type = "yumu"             # yumu-bot，直接连接 OneBot 服务（伪装用户 QQ 发 !bi 命令）
# url = "ws://121.41.63.60:11735/pub/onebotSocket"
# timeout_secs = 10
# rate_per_minute = 10
# burst = 20
# yumu 默认不鉴权（无需 access_token），但支持配置——设了就会按 OneBot 11 协议发 Authorization 头
# self_id 无关，yumu 直接用目标 QQ 号作为身份标识

# [match_listen]
# 比赛监听功能（!ml 命令），可选，不配置则使用默认值
# max_per_group = 3          # 每群最多同时监听的比赛数
# poll_interval_secs = 8     # 后台轮询间隔（秒），启动后会立即执行首轮检查
# notify_on_new_game = true  # 新场次开始时是否推送通知
# notify_on_complete = true  # 比赛结束时是否推送最终结果

[ppy_sb]
# ppy.sb 私服 API 配置（可选，不配置则使用默认值）
# api_base_url = "https://api.ppy.sb"  # API 基础 URL
# rate_burst = 120                     # 限流突发容量
# rate_per_minute = 120                # 每分钟请求上限

[plugin]
# .wasm 插件文件存放目录
dir = "./plugins"

# 插件实例连续错误计数超过此值则自动重载，默认 5
# lost_instances_threshold = 5

# 插件重载连续失败计数超过此值则要求手动干预，默认 3
# reload_failures_threshold = 3

# 插件实例列表
[[plugin.instances]]
name = "hello"
path = "hello_plugin.wasm"
enabled = false    # 默认禁用，改为 true 启用
priority = 50

# 可选：插件自定义配置（通过 get_plugin_config() 访问）
# [plugin.instances.config]
# endpoint = "https://api.example.com"
